name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e1148 # v4

      - uses: actions/setup-node@49933ea # v4
        with:
          node-version: '20'

      - run: npm ci
      - run: npm run build

      - name: Test native-host
        working-directory: native-host
        run: |
          npm ci
          npm test
